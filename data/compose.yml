services:
  neo4j:
    image: neo4j:latest
    container_name: neo4j
    environment:
      - NEO4J_AUTH=neo4j/test_pass
      - NEO4J_ACCEPT_LICENSE_AGREEMENT=yes
      - NEO4JLABS_PLUGINS=["apoc"]  # Install APOC plugin
      - NEO4J_dbms_security_procedures_unrestricted=apoc.*  # Allow APOC procedures
    ports:
      - "7474:7474"  # Neo4j Browser， HTTP 接口
      - "7687:7687"  # Bolt protocol, 这是 Neo4j 的主要通信协议
    volumes:
      - ./data:/data
      - ./logs:/logs
      - ./import:/import
    restart: always
    logging:
      driver: "json-file"
      options:
        max-size: "20m"

# bash
# To start the Neo4j service, run:
# docker-compose -f apis/neo4j/compose.yml up -d
# 即可以启动 Neo4j 服务，Neo4j 浏览器访问地址为 http://localhost:7474，默认用户名密码为 neo4j/test_pass
